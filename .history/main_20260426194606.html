<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Glasses Try-On</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>
<body>

  <main class="app">
    <section class="viewer-card">
      <div class="viewer-header">
        <div>
          <p class="label">Live Preview</p>
          <h1>Virtual Glasses Try-On</h1>
        </div>
        <span class="status">Camera Active</span>
      </div>

      <div id="viewer" class="viewer"></div>
    </section>

    <aside class="sidebar">
      <p class="label">Customize</p>
      <h2>Choose Style</h2>
      <p class="desc">Pilih kacamata yang mau dicoba secara real-time.</p>

      <div class="items">
        <button class="glass-card active" onclick="changeGlasses('assets/glasses1.png', this)">
          <img src="assets/glasses1.png" alt="Glasses 1">
          <span>Classic</span>
        </button>

        <button class="glass-card" onclick="changeGlasses('assets/glasses2.png', this)">
          <img src="assets/glasses2.png" alt="Glasses 2">
          <span>Modern</span>
        </button>

        <button class="glass-card" onclick="changeGlasses('assets/glasses3.png', this)">
          <img src="assets/glasses3.png" alt="Glasses 3">
          <span>Bold</span>
        </button>
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
