<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Glasses</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>

<body>

<main class="app">

  <div class="header">
    <h1>Virtual Glasses</h1>
    <p>Try different styles in real-time</p>
  </div>

  <div class="container">

    <!-- CAMERA -->
    <div class="viewer-section">
      <div class="frame">
        <div id="viewer"></div>
      </div>

      <button class="capture" onclick="capturePhoto()">
        📸 Capture
      </button>
    </div>

    <!-- PANEL -->
    <div class="panel">
      <h3>Choose Style</h3>

      <div class="grid">

        <button class="item active" onclick="changeGlasses('assets/glasses.png', this)">
          <img src="assets/glasses.png">
        </button>

        <button class="item" onclick="changeGlasses('assets/glasses1.png', this)">
          <img src="assets/glasses1.png">
        </button>

        <button class="item" onclick="changeGlasses('assets/glasses2.png', this)">
          <img src="assets/glasses2.png">
        </button>

        <button class="item" onclick="changeGlasses('assets/glasses3.png', this)">
          <img src="assets/glasses3.png">
        </button>

      </div>
    </div>

  </div>

</main>

<script src="script.js"></script>
</body>
</html>
